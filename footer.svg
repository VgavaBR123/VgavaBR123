<svg width="100%" height="60" viewBox="0 0 900 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fg" x1="0" y1="0" x2="900" y2="0">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7b68ee" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </linearGradient>
    <filter id="fgl"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <style>
    @keyframes rise{0%,100%{transform:translateY(0);opacity:.3}50%{transform:translateY(-8px);opacity:.8}}
    @keyframes drift{0%,100%{transform:translateX(0);opacity:.2}50%{transform:translateX(5px);opacity:.6}}
    .r1{animation:rise 3s ease-in-out infinite}
    .r2{animation:rise 3s ease-in-out infinite .6s}
    .r3{animation:rise 3s ease-in-out infinite 1.2s}
    .r4{animation:rise 3s ease-in-out infinite 1.8s}
    .r5{animation:rise 3s ease-in-out infinite 2.4s}
    .d1{animation:drift 4s ease-in-out infinite}
    .d2{animation:drift 4s ease-in-out infinite 1s}
    .d3{animation:drift 4s ease-in-out infinite 2s}
  </style>
  <!-- top line -->
  <rect x="0" y="2" width="900" height=".6" fill="url(#fg)" opacity=".3"/>
  <!-- particles -->
  <circle cx="200" cy="30" r="1.5" fill="#00e5ff" class="r1" filter="url(#fgl)"/>
  <circle cx="320" cy="25" r="1" fill="#4cc9f0" class="r2"/>
  <circle cx="400" cy="35" r="1.8" fill="#7b68ee" class="r3" filter="url(#fgl)"/>
  <circle cx="500" cy="28" r="1.2" fill="#c084fc" class="r4"/>
  <circle cx="620" cy="32" r="1.5" fill="#00e5ff" class="r5" filter="url(#fgl)"/>
  <circle cx="700" cy="22" r="1" fill="#7b68ee" class="r1"/>
  <!-- drifting dots -->
  <circle cx="150" cy="40" r=".8" fill="#4cc9f0" class="d1"/>
  <circle cx="450" cy="42" r=".8" fill="#c084fc" class="d2"/>
  <circle cx="750" cy="38" r=".8" fill="#00e5ff" class="d3"/>
  <!-- center text -->
  <text x="450" y="50" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="8" fill="#8b949e" opacity=".35">
    built with purpose // from porto velho to the world
  </text>
</svg>
