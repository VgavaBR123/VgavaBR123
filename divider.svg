<svg width="100%" height="30" viewBox="0 0 900 30" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dg" x1="0" y1="0" x2="900" y2="0">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00e5ff" stop-opacity=".6"/>
      <stop offset="50%" stop-color="#7b68ee" stop-opacity=".8"/>
      <stop offset="70%" stop-color="#c084fc" stop-opacity=".6"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </linearGradient>
    <filter id="dgl">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="spark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity=".9"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <style>
    @keyframes energy-pulse{0%{transform:translateX(-200px)}100%{transform:translateX(1100px)}}
    @keyframes dim{0%,100%{opacity:.3}50%{opacity:.7}}
    .ep{animation:energy-pulse 3s ease-in-out infinite}
    .dim{animation:dim 3s ease-in-out infinite}
  </style>
  <rect x="0" y="14" width="900" height=".8" fill="url(#dg)" opacity=".4" class="dim"/>
  <rect x="0" y="14" width="900" height=".4" fill="url(#dg)" opacity=".7"/>
  <!-- energy spark -->
  <circle cx="0" cy="14.5" r="6" fill="url(#spark)" class="ep" filter="url(#dgl)"/>
  <!-- center diamond -->
  <polygon points="450,8 456,15 450,22 444,15" fill="#7b68ee" opacity=".5" filter="url(#dgl)"/>
  <!-- side dots -->
  <circle cx="420" cy="15" r="1.2" fill="#00e5ff" opacity=".4"/>
  <circle cx="480" cy="15" r="1.2" fill="#c084fc" opacity=".4"/>
</svg>
