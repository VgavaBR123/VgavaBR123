<svg fill="none" viewBox="0 0 800 400" width="800" height="400" xmlns="http://www.w3.org/2000/svg">
	<foreignObject width="100%" height="100%">
		<div xmlns="http://www.w3.org/1999/xhtml">
			<style>
				.container {
					background-color: #0d1117;
					border: 1px solid #30363d;
					border-radius: 10px;
					font-family: 'Segoe UI', Ubuntu, sans-serif;
					color: #c9d1d9;
					height: 398px;
					overflow: hidden;
					box-shadow: 0 20px 50px rgba(0,0,0,0.5);
				}
				.header {
					background: #161b22;
					padding: 10px 15px;
					border-bottom: 1px solid #30363d;
					display: flex;
					align-items: center;
				}
				.buttons {
					display: flex;
					gap: 8px;
				}
				.button {
					width: 12px;
					height: 12px;
					border-radius: 50%;
				}
				.red { background: #ff5f56; }
				.yellow { background: #ffbd2e; }
				.green { background: #27c93f; }
				.title {
					margin-left: 20px;
					font-size: 13px;
					color: #8b949e;
					font-family: monospace;
				}
				.content {
					padding: 25px;
					line-height: 1.6;
				}
				.line {
					margin-bottom: 15px;
					display: flex;
					align-items: flex-start;
					opacity: 0;
					animation: fadeIn 0.5s forwards;
				}
				.prompt {
					color: #7b68ee;
					font-weight: bold;
					margin-right: 10px;
					font-family: monospace;
				}
				.command {
					color: #00e5ff;
					font-weight: bold;
					font-family: monospace;
				}
				.text {
					color: #e6edf3;
					font-size: 15px;
				}
				.highlight {
					color: #c084fc;
					font-weight: bold;
				}
				.side-quest {
					margin-left: 20px;
					font-size: 14px;
					color: #8b949e;
				}
				
				@keyframes fadeIn {
					from { opacity: 0; transform: translateY(10px); }
					to { opacity: 1; transform: translateY(0); }
				}
				
				.l1 { animation-delay: 0.2s; }
				.l2 { animation-delay: 1.0s; }
				.l3 { animation-delay: 1.8s; }
				.l4 { animation-delay: 2.6s; }
			</style>
			<div class="container">
				<div class="header">
					<div class="buttons">
						<div class="button red"></div>
						<div class="button yellow"></div>
						<div class="button green"></div>
					</div>
					<div class="title">vinicius-gava — zsh — 80x24</div>
				</div>
				<div class="content">
					<div class="line l1">
						<span class="prompt">~/vgava ❯</span>
						<span class="command">whoami</span>
					</div>
					<div class="line l1" style="margin-top:-10px; margin-left:25px;">
						<span class="text">
							🎓 Engenheiro Mecatrônico &amp; <span class="highlight">Cientista de Dados</span> em formação.<br/>
							🏛️ Diretor de Tecnologia @ SEMEC Porto Velho.<br/>
							🚀 Orquestrando o futuro do setor público com IA.
						</span>
					</div>
					
					<div class="line l2">
						<span class="prompt">~/vgava ❯</span>
						<span class="command">ls side_quests/</span>
					</div>
					<div class="line l2" style="margin-top:-10px; margin-left:25px;">
						<div class="text">
							• 🖨️ <span class="highlight">Smart Print</span> — Ecossistema 3D<br/>
							• 🧩 <span class="highlight">MCP</span> — LLM Bridge Server<br/>
							• 🎨 <span class="highlight">UI/UX</span> — Design centrado em dados
						</div>
					</div>
					
					<div class="line l3">
						<span class="prompt">~/vgava ❯</span>
						<span class="command">echo $PHILOSOPHY</span>
					</div>
					<div class="line l3" style="margin-top:-10px; margin-left:25px;">
						<span class="text" style="color: #7ee787; font-style: italic;">
							"Dados bem orquestrados são decisões públicas mais inteligentes."
						</span>
					</div>
				</div>
			</div>
		</div>
	</foreignObject>
</svg>